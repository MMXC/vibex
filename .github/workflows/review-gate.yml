name: Review Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=high --json | tee security/npm-audit.json
        continue-on-error: true

      - name: Comment audit results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const audit = JSON.parse(fs.readFileSync('security/npm-audit.json', 'utf8'));
              const count = Object.keys(audit.vulnerabilities || {}).length;
              if (count > 0) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `⚠️ **npm audit**: 发现 ${count} 个安全漏洞，请修复后合并。`
                });
              }
            } catch (e) {
              console.log('Could not parse audit results');
            }

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --source=. --report-path=security/gitleaks-report.json --report-format json
        continue-on-error: true

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Check coverage thresholds
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(cat coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total']['lines']['pct'])")
            echo "Line coverage: $LINES%"
            if (( $(echo "$LINES < 70" | bc -l) )); then
              echo "FAIL: Coverage $LINES% below 70% threshold"
              exit 1
            fi
            echo "Coverage check passed"
          fi

  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [security, code-quality, test]
    if: always()
    steps:
      - name: Check all gates
        run: |
          if [ "${{ needs.security.result }}" != "success" ] && [ "${{ needs.security.result }}" != "skipped" ]; then
            echo "⚠️ Security scan issues detected (check PR comments)"
          fi
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "❌ Code quality gate failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All review gates passed"
