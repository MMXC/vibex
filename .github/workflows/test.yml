name: Test Gate

on:
  push:
    branches: [main, develop]
    paths:
      # E3: CI/CD 守卫增强 — full test trigger on test config changes
      # When these files change, run the full test suite
      - 'vibex-fronted/playwright.config.ts'
      - 'vibex-fronted/playwright.ci.config.ts'
      - 'vibex-fronted/playwright.a11y.config.ts'
      - 'vibex-fronted/playwright.sse.config.ts'
      - 'vibex-fronted/e2e/playwright.config.ts'
      - 'vibex-fronted/vitest.config.ts'
      - 'vibex-fronted/tests/unit/vitest.config.ts'
      - 'vibex-fronted/coverage.config.js'
      - 'vibex-fronted/jest.config.ts'
      - 'vibex-fronted/babel.config.js'
      - '.github/workflows/test.yml'
      # Default: trigger on all other source changes
      - 'vibex-fronted/src/**'
      - 'vibex-fronted/tests/**'
      - 'vibex-backend/src/**'
      - 'packages/**'
      - '!**/*.md'
      - '!**/*.stories.tsx'
      - '!**/storybook-static/**'
  pull_request:
    branches: [main]
    paths:
      # E3: Run tests on config changes in PRs too
      - 'vibex-fronted/playwright.config.ts'
      - 'vibex-fronted/playwright.ci.config.ts'
      - 'vibex-fronted/playwright.a11y.config.ts'
      - 'vibex-fronted/playwright.sse.config.ts'
      - 'vibex-fronted/e2e/playwright.config.ts'
      - 'vibex-fronted/vitest.config.ts'
      - 'vibex-fronted/tests/unit/vitest.config.ts'
      - 'vibex-fronted/coverage.config.js'
      - 'vibex-fronted/jest.config.ts'
      - 'vibex-fronted/babel.config.js'
      - '.github/workflows/test.yml'
      - 'vibex-fronted/src/**'
      - 'vibex-fronted/tests/**'
      - 'vibex-backend/src/**'
      - 'packages/**'

jobs:
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check (frontend)
        run: cd vibex-fronted && pnpm exec tsc --noEmit
      - name: TypeScript check (backend)
        run: cd vibex-backend && pnpm exec tsc --noEmit
      - name: TODO grep (frontend)
        run: |
          TODO_COUNT=$(grep -rEn 'TODO(?!.*#[0-9]+)' vibex-fronted/src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v 'eslint-disable' | grep -v '// ' | wc -l)
          if [ "$TODO_COUNT" -gt 0 ]; then echo "::warning::TODO without issue: $TODO_COUNT found"; grep -rEn 'TODO(?!.*#[0-9]+)' vibex-fronted/src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v 'eslint-disable' | grep -v '// ' | head -5; fi
          echo "TODO count: $TODO_COUNT (warning only — see docs/naming-conventions.md for policy)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vibex-fronted run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm --filter vibex-fronted build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextjs-build
          path: vibex-fronted/.next/
          retention-days: 1

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vibex-fronted run test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: vibex-fronted/coverage/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Run E2E
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'https://vibex.top' }}
        run: pnpm --filter vibex-fronted run test:e2e:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: vibex-fronted/playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: vibex-fronted/test-results/
          retention-days: 7

  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [type-check, lint, unit, e2e]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "❌ TypeScript check failed"; exit 1;
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint failed"; exit 1;
          fi
          if [ "${{ needs.unit.result }}" != "success" ]; then
            echo "❌ Unit tests failed"; exit 1;
          fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "❌ E2E tests failed"; exit 1;
          fi
          echo "✅ All gates passed"

      - name: Bundle size check (warning)
        run: |
          # Check if .next/static chunks are reasonable
          if [ -d ".next/static/chunks" ]; then
            LARGEST=$(find .next/static/chunks -name "*.js" -exec du -k {} + 2>/dev/null | sort -rn | head -1 | cut -f1)
            echo "Largest chunk: ${LARGEST}KB"
            if [ "${LARGEST:-0}" -gt 500 ]; then
              echo "::warning::Largest chunk exceeds 500KB — consider dynamic imports"
            fi
          fi
