name: Test Gate

on:
  push:
    branches: [main, develop]
    paths:
      - 'vibex-fronted/playwright.config.ts'
      - 'vibex-fronted/playwright.ci.config.ts'
      - 'vibex-fronted/playwright.a11y.config.ts'
      - 'vibex-fronted/playwright.sse.config.ts'
      - 'vibex-fronted/e2e/playwright.config.ts'
      - 'vibex-fronted/vitest.config.ts'
      - 'vibex-fronted/tests/unit/vitest.config.ts'
      - 'vibex-fronted/coverage.config.js'
      - 'vibex-fronted/jest.config.ts'
      - 'vibex-fronted/babel.config.js'
      - '.github/workflows/test.yml'
      - 'vibex-fronted/src/**'
      - 'vibex-fronted/tests/**'
      - 'vibex-backend/src/**'
      - 'packages/**'
      - '!**/*.md'
      - '!**/*.stories.tsx'
      - '!**/storybook-static/**'
  pull_request:
    branches: [main]
    paths:
      - 'vibex-fronted/playwright.config.ts'
      - 'vibex-fronted/playwright.ci.config.ts'
      - 'vibex-fronted/playwright.a11y.config.ts'
      - 'vibex-fronted/playwright.sse.config.ts'
      - 'vibex-fronted/e2e/playwright.config.ts'
      - 'vibex-fronted/vitest.config.ts'
      - 'vibex-fronted/tests/unit/vitest.config.ts'
      - 'vibex-fronted/coverage.config.js'
      - 'vibex-fronted/jest.config.ts'
      - 'vibex-fronted/babel.config.js'
      - '.github/workflows/test.yml'
      - 'vibex-fronted/src/**'
      - 'vibex-fronted/tests/**'
      - 'vibex-backend/src/**'
      - 'packages/**'

env:
  PNPM_CACHE_FOLDER: .pnpm-store

jobs:
  # E1-U1: TypeScript check (backend)
  typecheck-backend:
    name: TypeScript (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
        working-directory: vibex-backend

  # E1-U1: TypeScript check (frontend)
  typecheck-frontend:
    name: TypeScript (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
        working-directory: vibex-fronted

  # E1-U2: as any baseline gate
  as-any-baseline:
    name: as any Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - name: Count as any usage
        run: |
          COUNT=$(grep -r "as any" vibex-fronted/src/ --include="*.ts" --include="*.tsx" | wc -l)
          echo "Found $COUNT usages of 'as any'"
          if [ "$COUNT" -gt 163 ]; then
            echo "❌ as any count ($COUNT) exceeds baseline (163)"
            echo "❌ Please fix or update AS_ANY_BASELINE.md baseline"
            exit 1
          fi
          echo "✅ as any count ($COUNT) within baseline (163)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vibex-fronted run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm --filter vibex-fronted build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextjs-build
          path: vibex-fronted/.next/
          retention-days: 1

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vibex-fronted run test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: vibex-fronted/coverage/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Verify BASE_URL does not contain production domain
        run: |
          if echo "$BASE_URL" | grep -q "vibex.top"; then
            echo "ERROR: BASE_URL contains vibex.top — staging must be configured"
            exit 1
          fi
          echo "BASE_URL is safe: $BASE_URL"

      - name: Check staging health
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BASE_URL/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy at $BASE_URL"
              exit 0
            fi
            echo "Retry $i/3: staging returned $STATUS"
            sleep 10
          done
          echo "WARNING: Staging not accessible at $BASE_URL (E2E will run against configured URL)"

      - name: Run E2E
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL }}
        run: pnpm --filter vibex-fronted run test:e2e:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: vibex-fronted/playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: vibex-fronted/test-results/
          retention-days: 7

      # C-E2-1: E2E flaky monitor — run after test execution, regardless of pass/fail
      - name: E2E flaky monitor
        if: always()
        run: pnpm --filter vibex-fronted run e2e:flaky:monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CI: true
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      # E1-U2: E2E summary Slack report — run after test execution, regardless of pass/fail
      - name: Validate Slack Webhook
        run: pnpm --filter vibex-fronted run webhook:dryrun
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: E2E Summary Slack Report
        if: always()
        run: pnpm --filter vibex-fronted run e2e:summary:slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CI: true
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [lint, unit, e2e, typecheck-backend, typecheck-frontend, as-any-baseline]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then echo "❌ Lint failed"; exit 1; fi
          if [ "${{ needs.unit.result }}" != "success" ]; then echo "❌ Unit tests failed"; exit 1; fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then echo "❌ E2E tests failed"; exit 1; fi
          if [ "${{ needs.typecheck-backend.result }}" != "success" ]; then echo "❌ TypeScript check (backend) failed"; exit 1; fi
          if [ "${{ needs.typecheck-frontend.result }}" != "success" ]; then echo "❌ TypeScript check (frontend) failed"; exit 1; fi
          if [ "${{ needs.as-any-baseline.result }}" != "success" ]; then echo "❌ as any baseline exceeded"; exit 1; fi
          echo "✅ All gates passed"
