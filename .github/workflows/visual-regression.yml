name: Visual Regression

on:
  workflow_dispatch:

jobs:
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create baseline directories
        run: |
          mkdir -p test-results/visual-baselines
          mkdir -p tests/e2e/screenshots/visual

      - name: Run visual regression tests
        run: pnpm test:e2e -- tests/e2e/visual-regression.spec.ts
        env:
          BASE_URL: http://localhost:3000
          SCREENSHOT_DIR: tests/e2e/screenshots
          UPDATE_SNAPSHOTS: ${{ github.event.inputs.update == 'true' }}

      - name: Upload baseline screenshots
        if: github.event.inputs.update == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: test-results/visual-baselines/
          retention-days: 30

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ github.run_id }}
          path: tests/e2e/screenshots/visual/
          retention-days: 7
