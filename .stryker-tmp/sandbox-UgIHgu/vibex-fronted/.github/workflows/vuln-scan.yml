name: Dependency Vulnerability Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # 每周日凌晨扫描

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run vulnerability scan
        run: npm run scan:vuln
        continue-on-error: true
        
      - name: Generate report
        run: npm run report:vuln
        
      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-report
          path: test-results/vulnerabilities/
          retention-days: 30
          
      - name: Check for critical vulnerabilities
        run: |
          REPORT=test-results/vulnerabilities/vulnerability-report.json
          if [ -f "$REPORT" ]; then
            CRITICAL=$(grep -o '"critical":[0-9]*' "$REPORT" | grep -o '[0-9]*')
            HIGH=$(grep -o '"high":[0-9]*' "$REPORT" | grep -o '[0-9]*')
            
            if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              echo "❌ Found critical/high vulnerabilities!"
              echo "Critical: $CRITICAL, High: $HIGH"
              cat test-results/vulnerabilities/vulnerability-report.md
              exit 1
            fi
          fi
