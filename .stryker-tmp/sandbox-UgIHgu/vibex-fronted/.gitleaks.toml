# Gitleaks Configuration for VibeX
# 敏感信息扫描规则

title = "VibeX Sensitive Data Rules"

# 通用规则
[[rules]]
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["aws", "security"]

[[rules]]
description = "AWS Secret Key"
regex = '''(?i)(aws_secret_access_key|aws_secret_key|secret_key)\s*[:=]\s*['\"][A-Za-z0-9/+=]{40}['\"]'''
tags = ["aws", "security"]

[[rules]]
description = "GitHub Token"
regex = '''gh[pousr]_[A-Za-z0-9_]{36,251}'''
tags = ["github", "security"]

[[rules]]
description = "Slack Token"
regex = '''xox[baprs]-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*'''
tags = ["slack", "security"]

[[rules]]
description = "Private Key (RSA/SSH)"
regex = '''-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----'''
tags = ["private-key", "security"]

[[rules]]
description = "API Key Generic"
regex = '''(?i)(api[_-]?key|apikey)\s*[:=]\s*['\"][a-zA-Z0-9_-]{20,}['\"]'''
tags = ["api-key", "security"]

# VibeX 特定规则
[[rules]]
description = "VibeX JWT Secret"
regex = '''(?i)(jwt[_-]?secret|jwt[_-]?key)\s*[:=]\s*['\"][a-zA-Z0-9_-]{32,}['\"]'''
tags = ["vibex", "jwt", "security"]

[[rules]]
description = "VibeX Database URL"
regex = '''(?i)(database[_-]?url|db[_-]?url|db[_-]?connection)\s*[:=]\s*['\"](postgres|mysql|mongodb)://[^'\"\s]+['\"]'''
tags = ["vibex", "database", "security"]

[[rules]]
description = "VibeX API Endpoint (Internal)"
regex = '''(?i)(api[_-]?endpoint|internal[_-]?api)\s*[:=]\s*['\"][a-zA-Z0-9._-]+/(api|v1)[^'\"\s]*['\"]'''
tags = ["vibex", "api", "security"]

[[rules]]
description = "Environment Variable with Secret"
regex = '''(?i)(env[_-]?(secret|key|token|password|credential))\s*[:=]\s*['\"][^'\"]{8,}['\"]'''
tags = ["env", "security"]

# 允许列表 (不扫描的文件)
[allowlist]
files = ['''(^|/)\.git/''', '''(^|/)\.next/''', '''(^|/)node_modules/''', '''(^|/)coverage/''', '''\.test\.ts$''', '''\.spec\.ts$''']

# 允许的路径
paths = ['''\.git''', '''\.next''', '''node_modules''', '''coverage''']
