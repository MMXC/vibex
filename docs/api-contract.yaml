openapi: 3.0.3
info:
  title: VibeX API Contract
  description: |
    VibeX 全栈项目 API 契约文档
    
    ## 版本历史
    - v1.1.0 (2026-03-28): 从 14 端点扩展至 90+ 端点，覆盖全部前端实际调用
    - v1.0.0 (初始): 基础 14 端点定义
    
    ## 路径约定
    - 所有路径相对于 `/api` 前缀（如 `/auth/login` → `/api/auth/login`）
    - 服务器基础路径: `/api`
    - 统一无 v1 前缀（v1 双写路由已废弃，标注 `deprecated: true`）
    
    ## 路由分类
    - **前端调用**: 前端 services/api/ 模块中实际调用
    - **后端独有**: `x-backend-only: true`，前端未调用但后端已实现
    - **废弃路由**: `deprecated: true`，v1 双写兼容层
    
    ## 16 个 Tag 分组
    | Tag | 前缀 | 说明 |
    |-----|------|------|
    | Auth | /auth | 认证 |
    | Users | /users | 用户 |
    | Projects | /projects | 项目管理 |
    | Requirements | /requirements | 需求 |
    | Clarifications | /clarifications | 澄清问答 |
    | DomainEntities | /domain-entities, /domains | 域实体 |
    | EntityRelations | /entity-relations | 实体关系 |
    | DDD | /ddd | DDD 限界上下文/域模型/业务流程 |
    | Design | /clarify, /domain, /flow, /pages, /prototype, /design | 设计流程 |
    | Flows | /flows | 流程图 |
    | PrototypeSnapshots | /prototype-snapshots | 原型快照 |
    | Agents | /agents | Agent |
    | Pages | /pages | 页面 |
    | Chat | /chat | AI 对话 |
    | Plan | /plan | 计划分析 |
    | Diagnosis | /diagnosis | 需求诊断 |
    | BackendOnly | 各类后端独有路由 | 未被前端调用的后端路由 |
    | Deprecated | /api/v1/* | v1 兼容层（废弃） |
  version: 1.1.0
  contact:
    name: VibeX Team

servers:
  - url: /api
    description: API 基础路径

tags:
  - name: Auth
    description: 认证相关接口（登录/注册/登出/当前用户）
  - name: Users
    description: 用户管理
  - name: Projects
    description: 项目管理（含软删除/恢复/角色）
  - name: Requirements
    description: 需求管理（含分析/澄清/域关联）
  - name: Clarifications
    description: 澄清问答
  - name: DomainEntities
    description: 域实体管理
  - name: EntityRelations
    description: 实体关系管理
  - name: DDD
    description: DDD 限界上下文/域模型/业务流程生成
  - name: Design
    description: 设计流程（澄清/域/流程/页面/原型）
  - name: Flows
    description: 流程图管理
  - name: PrototypeSnapshots
    description: 原型快照
  - name: Agents
    description: Agent 管理
  - name: Pages
    description: 页面管理
  - name: Chat
    description: AI 对话（流式）
  - name: Plan
    description: 计划分析与 Feature 推导
  - name: Diagnosis
    description: 需求质量诊断
  - name: BackendOnly
    description: 后端独有路由（前端未调用）
  - name: Deprecated
    description: v1 兼容层（已废弃，统一使用无前缀路径）

paths:
  # =============================================================================
  # TAG: AUTH
  # =============================================================================
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 邮箱已存在

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前登录用户
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: 用户登出
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # =============================================================================
  # TAG: USERS
  # =============================================================================
  /users/{userId}:
    get:
      tags: [Users]
      summary: 获取用户信息
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: 更新用户信息
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================================================
  # TAG: PROJECTS
  # =============================================================================
  /projects:
    get:
      tags: [Projects]
      summary: 获取项目列表
      operationId: getProjects
      parameters:
        - name: userId
          in: query
          description: 按用户筛选
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Projects]
      summary: 创建项目
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{projectId}:
    get:
      tags: [Projects]
      summary: 获取单个项目
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Projects]
      summary: 更新项目
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: 删除项目（永久删除）
      operationId: deleteProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/deleted:
    get:
      tags: [Projects]
      summary: 获取已删除项目列表（回收站）
      operationId: getDeletedProjects
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
    delete:
      tags: [Projects]
      summary: 清空所有已删除项目
      operationId: clearDeletedProjects
      responses:
        '200':
          description: 清空成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /projects/{projectId}/soft-delete:
    patch:
      tags: [Projects]
      summary: 软删除项目（移至回收站）
      operationId: softDeleteProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 软删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/restore:
    patch:
      tags: [Projects]
      summary: 恢复已软删除的项目
      operationId: restoreProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/permanent:
    delete:
      tags: [Projects]
      summary: 永久删除项目（绕过软删除）
      operationId: permanentDeleteProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 永久删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/role:
    get:
      tags: [Projects]
      summary: 获取当前用户在项目中的角色
      operationId: getProjectRole
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    $ref: '#/components/schemas/ProjectRole'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/settings:
    get:
      tags: [Projects]
      summary: 获取项目设置
      operationId: getProjectSettings
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: object
                    description: 项目配置 JSON
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Projects]
      summary: 更新项目设置
      operationId: updateProjectSettings
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /confirmation-projects:
    get:
      tags: [Projects]
      summary: 获取待确认项目列表
      operationId: getConfirmationProjects
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'

  # =============================================================================
  # TAG: REQUIREMENTS
  # =============================================================================
  /requirements:
    get:
      tags: [Requirements]
      summary: 获取需求列表
      operationId: getRequirements
      parameters:
        - name: projectId
          in: query
          description: 按项目筛选
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  requirements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Requirement'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Requirements]
      summary: 创建需求
      operationId: createRequirement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementCreate'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  requirement:
                    $ref: '#/components/schemas/Requirement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /requirements/{requirementId}:
    get:
      tags: [Requirements]
      summary: 获取单个需求
      operationId: getRequirement
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
          description: 需求 ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  requirement:
                    $ref: '#/components/schemas/Requirement'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Requirements]
      summary: 更新需求
      operationId: updateRequirement
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  requirement:
                    $ref: '#/components/schemas/Requirement'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Requirements]
      summary: 删除需求
      operationId: deleteRequirement
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /requirements/{requirementId}/analyze:
    post:
      tags: [Requirements]
      summary: 分析需求（AI 驱动）
      operationId: analyzeRequirement
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 分析成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  requirement:
                    $ref: '#/components/schemas/Requirement'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /requirements/{requirementId}/reanalyze:
    post:
      tags: [Requirements]
      summary: 重新分析需求（带额外上下文）
      operationId: reanalyzeRequirement
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: 重新分析成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  requirement:
                    $ref: '#/components/schemas/Requirement'
        '404':
          $ref: '#/components/responses/NotFound'

  /requirements/{requirementId}/analysis:
    get:
      tags: [Requirements]
      summary: 获取需求分析结果
      operationId: getAnalysisResult
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysisResult:
                    $ref: '#/components/schemas/AnalysisResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /requirements/{requirementId}/clarifications:
    get:
      tags: [Clarifications]
      summary: 获取需求的澄清问题列表
      operationId: getClarifications
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  clarifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Clarification'
    post:
      tags: [Clarifications]
      summary: 为需求新增澄清问题
      operationId: createClarification
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                topic:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  clarification:
                    $ref: '#/components/schemas/Clarification'
        '400':
          $ref: '#/components/responses/BadRequest'

  /requirements/{requirementId}/domains:
    post:
      tags: [Requirements]
      summary: 为需求创建关联的域实体
      operationId: createRequirementDomain
      parameters:
        - name: requirementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainEntityCreate'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    $ref: '#/components/schemas/DomainEntity'
        '400':
          $ref: '#/components/responses/BadRequest'

  # =============================================================================
  # TAG: CLARIFICATIONS
  # =============================================================================
  /clarifications/{clarificationId}:
    put:
      tags: [Clarifications]
      summary: 更新澄清（回答/跳过）
      operationId: updateClarification
      parameters:
        - name: clarificationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                answer:
                  type: string
                status:
                  type: string
                  enum: [answered, skipped, pending]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  clarification:
                    $ref: '#/components/schemas/Clarification'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================================================
  # TAG: DOMAIN ENTITIES
  # =============================================================================
  /domain-entities:
    get:
      tags: [DomainEntities]
      summary: 获取域实体列表
      operationId: getDomainEntities
      parameters:
        - name: requirementId
          in: query
          required: true
          schema:
            type: string
          description: 关联的需求 ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  domainEntities:
                    type: array
                    items:
                      $ref: '#/components/schemas/DomainEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /domains/{entityId}:
    get:
      tags: [DomainEntities]
      summary: 获取单个域实体
      operationId: getDomainEntity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    $ref: '#/components/schemas/DomainEntity'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [DomainEntities]
      summary: 更新域实体
      operationId: updateDomainEntity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainEntityUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    $ref: '#/components/schemas/DomainEntity'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [DomainEntities]
      summary: 删除域实体
      operationId: deleteDomainEntity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================================================
  # TAG: ENTITY RELATIONS
  # =============================================================================
  /entity-relations:
    get:
      tags: [EntityRelations]
      summary: 获取实体关系列表
      operationId: getEntityRelations
      parameters:
        - name: requirementId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  entityRelations:
                    type: array
                    items:
                      $ref: '#/components/schemas/EntityRelation'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [EntityRelations]
      summary: 创建实体关系
      operationId: createEntityRelation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityRelationCreate'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
