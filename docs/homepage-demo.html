<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeX 首页布局演示</title>
  <style>
    :root {
      --color-primary: #3b82f6;
      --color-primary-hover: #2563eb;
      --color-primary-muted: #dbeafe;
      --color-secondary: #6366f1;
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f9fafb;
      --color-bg-tertiary: #f3f4f6;
      --color-border: #e5e7eb;
      --color-text-primary: #111827;
      --color-text-secondary: #6b7280;
      --color-text-muted: #9ca3af;
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --radius-lg: 0.5rem;
      --radius-xl: 0.75rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
    }

    .demo-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .demo-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }

    .demo-section {
      margin-bottom: 40px;
    }

    .demo-label {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 15px;
      padding-left: 10px;
      border-left: 4px solid var(--color-primary);
    }

    /* ========== 全收起状态 ========== */
    .page-collapsed {
      background: var(--color-bg-primary);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      height: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header-collapsed {
      height: 50px;
      background: var(--color-bg-primary);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .header-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-primary);
    }

    .header-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .header-nav span {
      font-size: 14px;
      color: var(--color-text-secondary);
      cursor: pointer;
    }

    .header-nav span.active {
      color: var(--color-primary);
      font-weight: 500;
    }

    .btn-login {
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      cursor: pointer;
    }

    .preview-area-collapsed {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
      position: relative;
    }

    .preview-placeholder {
      width: 80%;
      height: 80%;
      background: var(--color-bg-secondary);
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 15px;
    }

    .preview-placeholder-text {
      color: var(--color-text-muted);
      font-size: 16px;
    }

    .bottom-bar-collapsed {
      height: 60px;
      background: var(--color-bg-primary);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 15px;
    }

    .input-compact {
      flex: 1;
      height: 40px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 0 15px;
      font-size: 14px;
    }

    .btn-tool {
      padding: 8px 12px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-tool:hover {
      background: var(--color-primary-muted);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .btn-primary {
      background: var(--color-primary);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
    }

    /* ========== 全展开状态 ========== */
    .page-expanded {
      background: var(--color-bg-primary);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      height: 800px;
      display: grid;
      grid-template-rows: 50px 1fr 60px;
      grid-template-columns: 220px 1fr 280px;
      overflow: hidden;
    }

    .header-expanded {
      grid-column: 1 / -1;
      background: var(--color-bg-primary);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .left-drawer-expanded {
      background: var(--color-bg-secondary);
      border-right: 1px solid var(--color-border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 15px;
      background: var(--color-bg-primary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      font-size: 14px;
      cursor: pointer;
    }

    .step-item.active {
      background: var(--color-primary-muted);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .step-num {
      width: 24px;
      height: 24px;
      background: var(--color-bg-tertiary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .step-item.active .step-num {
      background: var(--color-primary);
      color: white;
    }

    .preview-area-expanded {
      background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .preview-mermaid {
      width: 90%;
      height: 90%;
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .mermaid-icon {
      font-size: 48px;
    }

    .mermaid-text {
      color: var(--color-text-secondary);
      font-size: 14px;
    }

    .right-drawer-expanded {
      background: var(--color-bg-secondary);
      border-left: 1px solid var(--color-border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .drawer-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .thinking-item {
      background: var(--color-bg-primary);
      border-radius: var(--radius-lg);
      padding: 12px;
      font-size: 13px;
      color: var(--color-text-secondary);
      border-left: 3px solid var(--color-primary);
    }

    .thinking-item.new {
      animation: pulse 1s ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .bottom-bar-expanded {
      grid-column: 1 / -1;
      background: var(--color-bg-primary);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 15px;
    }

    /* ========== 展开的底部抽屉 ========== */
    .bottom-drawer-expanded {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      height: 350px;
      background: var(--color-bg-primary);
      border-top: 1px solid var(--color-border);
      box-shadow: var(--shadow-xl);
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 20px;
    }

    .drawer-section {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-lg);
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-primary);
    }

    .section-content {
      flex: 1;
      background: var(--color-bg-primary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      padding: 10px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .btn-save {
      margin-top: auto;
      padding: 10px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: 14px;
    }

    /* ========== 登录抽屉 ========== */
    .login-drawer {
      position: absolute;
      top: 50px;
      right: 20px;
      width: 360px;
      background: var(--color-bg-primary);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 20px;
      z-index: 100;
    }

    .login-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .login-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid var(--color-border);
      color: var(--color-text-secondary);
    }

    .login-tab.active {
      border-color: var(--color-primary);
      color: var(--color-primary);
      font-weight: 500;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .login-divider {
      text-align: center;
      font-size: 12px;
      color: var(--color-text-muted);
      margin: 10px 0;
    }

    .btn-oauth {
      width: 100%;
      padding: 12px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: 14px;
    }

    .page-expanded { position: relative; }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1 class="demo-title">VibeX 首页布局演示</h1>

    <!-- 全收起状态 -->
    <div class="demo-section">
      <div class="demo-label">状态一：全收起</div>
      <div class="page-collapsed">
        <div class="header-collapsed">
          <div class="header-logo">VibeX</div>
          <div class="header-nav">
            <span>首页</span>
            <span>项目</span>
            <span>模板</span>
            <span class="active">更新日志</span>
            <button class="btn-login">登录 / 注册</button>
          </div>
        </div>
        <div class="preview-area-collapsed">
          <div class="preview-placeholder">
            <div style="font-size: 48px;">📋</div>
            <div class="preview-placeholder-text">输入需求后，这里将显示 DDD 分析结果</div>
          </div>
        </div>
        <div class="bottom-bar-collapsed">
          <input type="text" class="input-compact" placeholder="输入需求...">
          <button class="btn-tool">💾 保存</button>
          <button class="btn-tool">🔄 重新生成</button>
          <button class="btn-tool btn-primary">📁 创建项目</button>
          <button class="btn-tool">⬆️ 展开</button>
        </div>
      </div>
    </div>

    <!-- 全展开状态 -->
    <div class="demo-section">
      <div class="demo-label">状态二：全展开（带登录抽屉）</div>
      <div class="page-expanded">
        <div class="header-expanded">
          <div class="header-logo">VibeX</div>
          <div class="header-nav">
            <span>首页</span>
            <span>项目</span>
            <span>模板</span>
            <span>更新日志</span>
            <button class="btn-login">登录 / 注册</button>
          </div>
        </div>

        <!-- 左侧抽屉 - 步骤指示器 -->
        <div class="left-drawer-expanded">
          <div class="drawer-title">步骤指示器</div>
          <div class="step-item active">
            <div class="step-num">1</div>
            <span>需求录入</span>
          </div>
          <div class="step-item">
            <div class="step-num">2</div>
            <span>需求澄清</span>
          </div>
          <div class="step-item">
            <div class="step-num">3</div>
            <span>业务流程</span>
          </div>
          <div class="step-item">
            <div class="step-num">4</div>
            <span>组件图</span>
          </div>
        </div>

        <!-- 中间预览区 -->
        <div class="preview-area-expanded">
          <div class="preview-mermaid">
            <div class="mermaid-icon">🔄</div>
            <div class="mermaid-text">Mermaid 流程图预览区域</div>
          </div>

          <!-- 底部展开抽屉 -->
          <div class="bottom-drawer-expanded">
            <div class="drawer-section">
              <div class="section-title">需求录入</div>
              <div class="section-content">输入框...</div>
            </div>
            <div class="drawer-section">
              <div class="section-title">需求澄清</div>
              <div class="section-content">AI追问内容...</div>
            </div>
            <div class="drawer-section">
              <div class="section-title">业务流程图</div>
              <div class="section-content">图示...</div>
            </div>
            <div class="drawer-section">
              <div class="section-title">业务组件图</div>
              <div class="section-content">组件...</div>
              <button class="btn-save">💾 保存</button>
            </div>
          </div>
        </div>

        <!-- 右侧抽屉 - AI思考过程 -->
        <div class="right-drawer-expanded">
          <div class="drawer-title">AI 思考过程</div>
          <div class="thinking-item new">正在分析需求结构...</div>
          <div class="thinking-item">识别核心实体：用户、商品、订单</div>
          <div class="thinking-item">发现 3 个限界上下文</div>
          <div class="thinking-item">规划业务流程：浏览→选择→下单→支付</div>
        </div>

        <!-- 底部工具栏 -->
        <div class="bottom-bar-expanded">
          <input type="text" class="input-compact" placeholder="输入需求或指令...">
          <button class="btn-tool">💾 保存</button>
          <button class="btn-tool">🔄 重新生成</button>
          <button class="btn-tool btn-primary">📁 创建项目</button>
          <button class="btn-tool">⬆️ 收起</button>
        </div>

        <!-- 登录抽屉 -->
        <div class="login-drawer">
          <div class="login-tabs">
            <div class="login-tab active">登录</div>
            <div class="login-tab">注册</div>
          </div>
          <div class="login-form">
            <input type="email" class="form-input" placeholder="邮箱">
            <input type="password" class="form-input" placeholder="密码">
            <button class="btn-submit">登录</button>
            <div class="login-divider">或</div>
            <button class="btn-oauth">Continue with Google</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
