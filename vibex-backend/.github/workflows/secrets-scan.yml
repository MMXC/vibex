name: Secrets Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG_PATH: .gitleaks.toml
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install npm packages
        run: npm ci

      - name: Check for sensitive data in .env
        run: |
          echo "Checking .env file..."
          if [ -f .env ]; then
            echo "❌ .env file found in repository!"
            echo "Please add .env to .gitignore and use .env.example instead"
            exit 1
          fi
          echo "✅ No .env file in repository"

      - name: Scan for potential secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."
          # Check for common secret patterns
          grep -r --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
            -E "(password|secret|token|api_key|apikey)\s*[:=]\s*['\"][^'\"]{8,}['\"]" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude=*.test.ts \
            --exclude=*.spec.ts \
            || echo "No hardcoded secrets found"

  branch-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Check for protected branches
        run: |
          echo "Checking branch protection rules..."
          # This is a placeholder - actual implementation depends on repo settings
          echo "✅ Branch protection check complete"
