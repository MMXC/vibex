# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks

[title]
description = "VibeX secrets detection configuration"

[[rules]]
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["aws", "key"]

[[rules]]
description = "AWS Secret Key"
regex = '''(?i)(aws_secret_access_key|aws_secret|secret_key)(.{0,20})?['\"][0-9a-zA-Z/+]{40}['\"]'''
tags = ["aws", "secret"]

[[rules]]
description = "Cloudflare API Token"
regex = '''(?i)(cloudflare_api_token|cloudflare_api_key|cf_api_token|cf_token)(.{0,20})?['\"][a-zA-Z0-9]{32,}['\"]'''
tags = ["cloudflare", "api"]

[[rules]]
description = "GitHub Token"
regex = '''gh[pousr]_[A-Za-z0-9_]{36,251}'''
tags = ["github", "token"]

[[rules]]
description = "GitHub OAuth Access Token"
regex = '''gho_[0-9a-zA-Z]{36}'''
tags = ["github", "oauth"]

[[rules]]
description = "Slack Token"
regex = '''xox[baprs]-([0-9a-zA-Z]{10,48})?'''
tags = ["slack", "token"]

[[rules]]
description = "Database Connection String"
regex = '''(?i)(mysql|postgres|sqlite)://[^\\s]+'''
tags = ["database", "connection"]

[[rules]]
description = "Private Key"
regex = '''-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'''
tags = ["private", "key"]

[[rules]]
description = "JWT Token"
regex = '''eyJ[A-Za-z0-9-_=]+\.eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_.+/=]*'''
tags = ["jwt", "token"]

[[rules]]
description = "Generic API Key"
regex = '''(?i)(api_key|apikey|api_secret|apisecret|client_secret|clientsecret|access_token|accesstoken)(.{0,20})?['\"][0-9a-zA-Z]{16,64}['\"]'''
tags = ["api", "key"]

[allowlist]
description = "Allowlisted files and patterns"
files = ['''(^|/)\.git/''', '''(^|/)node_modules/''', '''\.env\.example$''', '''\.gitleaks\.toml$''']
regexes = ['''your_api_token_here''']
