name = "vibex-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# E2: Cache API for multi-Worker rate limiting
[[caches]]
name = "RATE_LIMIT_CACHE"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "vibex-db"
database_id = "52de5df6-fe28-48c2-b2ab-bac4812597d0"

# 环境变量（非敏感）
[vars]
ENVIRONMENT = "production"

# 敏感信息通过 wrangler secret put 配置:
# - JWT_SECRET
# - MINIMAX_API_KEY
# - MINIMAX_API_BASE
# - MINIMAX_MODEL
# - DOUBAO_API_KEY
# - DOUBAO_API_BASE (可选，默认 https://ark.cn-beijing.volces.com/api/coding/v3)
# - DOUBAO_MODEL (可选，默认 Doubao-Seed-2.0-pro)

# 自定义域名
[[routes]]
pattern = "api.vibex.top/*"
zone_name = "vibex.top"

# Durable Objects
[[durable_objects.bindings]]
name = "COLLABORATION_ROOM"
class_name = "CollaborationRoom"

# KV namespaces — create via `wrangler kv:namespace create <name>`
# and replace the id placeholders below
[[kv_namespaces]]
binding = "COLLABORATION_KV"
id = "f0dde43e5e274918a54349f959d57410"
preview_id = "f0dde43e5e274918a54349f959d57410"

[[kv_namespaces]]
binding = "NOTIFICATION_KV"
id = "1e01fb6a0da84d90870c800df2c6303a"
preview_id = "1e01fb6a0da84d90870c800df2c6303a"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationRoom"]