name: Coverage Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      # F1.1: npm 缓存配置 - 使用 hashFiles 确保一致性
      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
          
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci
        
      - name: Run tests with coverage
        run: npm test -- --coverage
        
      - name: Run coverage diff check
        run: |
          # Fetch baseline from main branch if exists
          if git show main:coverage/baseline.json > /dev/null 2>&1; then
            git fetch origin main:main
            node scripts/coverage-diff.js --fetch
          fi
          
          # Run coverage comparison
          node scripts/coverage-diff.js

      # Quality Gate: block merge if coverage < 85%
      - name: Coverage Quality Gate
        run: |
          echo "=== CI Quality Gate: 85% Coverage ==="
          node scripts/check-coverage.js
        
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage/
            !coverage/**/*.map
          retention-days: 7
