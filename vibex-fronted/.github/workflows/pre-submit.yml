name: Pre-submit Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pre-submit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run pre-submit checks
        run: |
          chmod +x scripts/pre-submit-check.sh
          ./scripts/pre-submit-check.sh || true
      
      - name: Report ESLint disable count
        run: |
          COUNT=$(grep -rEn "eslint-disable" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l)
          echo "::notice::ESLint disable count: $COUNT (threshold: 20)"

      - name: Run stylelint CSS quality gate
        run: |
          npx stylelint "src/**/*.css" "src/**/**/*.css" || exit 1
