{
  "openapi": "3.0.0",
  "info": {
    "title": "VibeX Canvas Snapshots API",
    "version": "1.0.0",
    "description": "Canvas versioned snapshot storage API — part of canvas-json-persistence E2"
  },
  "paths": {
    "/v1/canvas/snapshots": {
      "get": {
        "summary": "List snapshots for a project",
        "parameters": [
          { "name": "projectId", "in": "query", "required": true, "schema": { "type": "string" } },
          { "name": "limit", "in": "query", "schema": { "type": "integer", "default": 50 } },
          { "name": "offset", "in": "query", "schema": { "type": "integer", "default": 0 } }
        ],
        "responses": {
          "200": {
            "description": "Snapshot list",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "snapshots": {
                      "type": "array",
                      "items": { "$ref": "#/components/schemas/CanvasSnapshot" }
                    },
                    "total": { "type": "integer" }
                  }
                }
              }
            }
          }
        }
      },
      "post": {
        "summary": "Create a new snapshot",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/CreateSnapshotRequest" }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Snapshot created",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": { "type": "boolean" },
                    "snapshot": { "$ref": "#/components/schemas/CanvasSnapshot" },
                    "version": { "type": "integer" }
                  }
                }
              }
            }
          },
          "400": { "description": "Invalid request body" },
          "409": {
            "description": "Version conflict — optimistic lock failure",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": { "type": "boolean" },
                    "error": {
                      "type": "object",
                      "properties": {
                        "code": { "type": "string", "example": "VERSION_CONFLICT" },
                        "message": { "type": "string" },
                        "serverVersion": { "type": "integer" },
                        "localVersion": { "type": "integer" }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/v1/canvas/snapshots/{id}": {
      "get": {
        "summary": "Get specific snapshot",
        "parameters": [{ "name": "id", "in": "path", "required": true, "schema": { "type": "string" } }],
        "responses": {
          "200": { "description": "Snapshot details", "content": { "application/json": { "schema": { "type": "object", "properties": { "success": { "type": "boolean" }, "snapshot": { "$ref": "#/components/schemas/CanvasSnapshot" } } } } } },
          "404": { "description": "Snapshot not found" }
        }
      }
    },
    "/v1/canvas/snapshots/{id}/restore": {
      "post": {
        "summary": "Restore canvas to a specific snapshot",
        "parameters": [{ "name": "id", "in": "path", "required": true, "schema": { "type": "string" } }],
        "responses": {
          "201": { "description": "Restored successfully" },
          "404": { "description": "Snapshot not found" }
        }
      }
    },
    "/v1/canvas/rollback": {
      "get": {
        "summary": "List snapshot versions",
        "parameters": [{ "name": "projectId", "in": "query", "required": true, "schema": { "type": "string" } }],
        "responses": {
          "200": { "description": "Version list" }
        }
      },
      "post": {
        "summary": "Rollback to a specific version",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": ["projectId", "targetVersion"],
                "properties": {
                  "projectId": { "type": "string" },
                  "targetVersion": { "type": "integer" },
                  "createBackup": { "type": "boolean", "default": true }
                }
              }
            }
          }
        },
        "responses": {
          "201": { "description": "Rollback successful" },
          "404": { "description": "Version not found" }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "CanvasSnapshot": {
        "type": "object",
        "required": ["snapshotId", "projectId", "label", "trigger", "createdAt", "version"],
        "properties": {
          "snapshotId": { "type": "string" },
          "projectId": { "type": ["string", "null"] },
          "label": { "type": "string" },
          "trigger": { "type": "string", "enum": ["manual", "auto", "ai_complete"] },
          "createdAt": { "type": "string", "format": "date-time" },
          "version": { "type": "integer", "description": "Auto-increment version per project — E1" },
          "contextCount": { "type": "integer" },
          "flowCount": { "type": "integer" },
          "componentCount": { "type": "integer" }
        }
      },
      "CreateSnapshotRequest": {
        "type": "object",
        "required": ["label"],
        "properties": {
          "projectId": { "type": ["string", "null"] },
          "label": { "type": "string" },
          "trigger": { "type": "string", "enum": ["manual", "auto", "ai_complete"], "default": "manual" },
          "contextNodes": { "type": "array", "items": { "type": "object" }, "default": [] },
          "flowNodes": { "type": "array", "items": { "type": "object" }, "default": [] },
          "componentNodes": { "type": "array", "items": { "type": "object" }, "default": [] },
          "version": { "type": ["integer", "null"], "description": "E1: For optimistic locking — if provided, backend checks for conflicts" }
        }
      }
    }
  }
}
