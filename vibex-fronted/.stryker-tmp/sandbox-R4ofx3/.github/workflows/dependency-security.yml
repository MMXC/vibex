name: Dependency Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # F1.1: npm 缓存配置 - 使用 hashFiles 确保一致性
      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci
      
      - name: Run npm audit
        run: |
          # Generate JSON report for artifact
          npm audit --json > audit-report.json
          
          # Parse vulnerability counts
          output=$(cat audit-report.json)
          critical=$(echo "$output" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf-8')).metadata.vulnerabilities.critical || 0)")
          high=$(echo "$output" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf-8')).metadata.vulnerabilities.high || 0)")
          moderate=$(echo "$output" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf-8')).metadata.vulnerabilities.moderate || 0)")
          low=$(echo "$output" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf-8')).metadata.vulnerabilities.low || 0)")
          
          echo "Vulnerability Summary:"
          echo "  Critical: $critical"
          echo "  High: $high"
          echo "  Moderate: $moderate"
          echo "  Low: $low"
          
          # Block on Critical/High, warn on Moderate/Low
          if [ "$critical" -gt 0 ] || [ "$high" -gt 0 ]; then
            echo "::error::Found Critical/High vulnerabilities! PR blocked."
            exit 1
          elif [ "$moderate" -gt 0 ] || [ "$low" -gt 0 ]; then
            echo "::warning::Found Moderate/Low vulnerabilities (non-blocking)."
          fi
      
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30
      
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
