<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>离线模式 - VibeX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, sans-serif;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { text-align: center; padding: 40px; max-width: 400px; }
    h1 { font-size: 24px; margin-bottom: 16px; color: #fff; }
    p { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.6; }
    button { background: #3b82f6; color: #fff; border: none; padding: 10px 24px;
             border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📡 离线模式</h1>
    <p>当前无网络连接，部分功能可能不可用。<br/>请检查网络后点击下方按钮刷新。</p>
    <button onclick="window.location.reload()">重新加载</button>
  </div>
</body>
</html>
