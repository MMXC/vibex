name = "vibex-frontend"
pages_build_output_dir = ".opennext/cloudflare"

# 环境变量配置
[vars]
NEXT_PUBLIC_API_BASE_URL = "https://api.vibex.top/api"
NEXT_PUBLIC_APP_URL = "https://dev.vibex.top"

# 生产环境配置
[env.production]
name = "vibex-frontend-prod"

[env.production.vars]
NEXT_PUBLIC_API_BASE_URL = "https://api.vibex.top/api"
NEXT_PUBLIC_APP_URL = "https://vibex.top"

# 预览环境配置
[env.preview]
name = "vibex-frontend-preview"

[env.preview.vars]
NEXT_PUBLIC_API_BASE_URL = "https://api-dev.vibex.top/api"
NEXT_PUBLIC_APP_URL = "https://dev.vibex.top"
